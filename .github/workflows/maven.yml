# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Code Style ──────────────────────────────────────────────
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PathmodelBackend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Checkstyle
        run: mvn -B checkstyle:check

  # ── 2. Compile ─────────────────────────────────────────────────
  compile:
    name: Compile
    needs: checkstyle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PathmodelBackend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Compile
        run: mvn -B compile -Dcheckstyle.skip=true

  # ── 3. Test ────────────────────────────────────────────────────
  test:
    name: Test
    needs: compile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PathmodelBackend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Tests
        run: mvn -B test -Dcheckstyle.skip=true
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: PathmodelBackend/target/surefire-reports/
          retention-days: 30

  # ── 4. Package ─────────────────────────────────────────────────
  package:
    name: Package
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: PathmodelBackend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Package
        run: mvn -B package -Dcheckstyle.skip=true -DskipTests=true
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: PathmodelBackend/target/*.jar
          retention-days: 30

  # ── 5. Dependency Review ────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

