name: Java CI with Maven

on:
  push:
  pull_request:
    branches: [ "main", "dev" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "25"
  JAVA_DISTRIBUTION: "temurin"

defaults:
  run:
    working-directory: PathmodelBackend

jobs:
  verify:
    name: Verify Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run verification and generate docs
        run: mvn -B verify javadoc:javadoc

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: PathmodelBackend/target/surefire-reports/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: PathmodelBackend/target/site/jacoco/
          retention-days: 30

      - name: Upload Javadoc
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc
          path: PathmodelBackend/target/site/apidocs/
          retention-days: 30

  package:
    name: Package Application
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Package application
        run: mvn -B -Dcheckstyle.skip=true -DskipTests=true package

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: application-packages
          path: |
            PathmodelBackend/target/*.jar
            PathmodelBackend/target/*.war
          retention-days: 30

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
